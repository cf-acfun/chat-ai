spring:
  application:
    name: chat-ai
  profiles:
    active: sit
  ai:
    minimax:
      api-key: ${MINIMAX_API_KEY}
      chat:
        options:
          model: abab6.5g-chat     # 可选：abab6.5s-chat, abab6.5t-chat, abab5.5-chat
          temperature: 0.7         # 控制温度（0-1）
          max-tokens: 2000       # 最大生成 token 数
          top-p: 1.0             # 核采样参数
  # 启用MiniMax作为默认聊天模型
  model:
    chat: minimax
